<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>訂單狀態查詢系统</title>
    <style>
        /* 溫柔莫蘭迪色系 */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background-color: #e8e7e3; /* 莫蘭迪淺灰燕麥底色 */
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
            color: #4a4a4a;
        }
        .container { 
            background: #f4f3ef; /* 霧面米白 */
            padding: 30px 20px; 
            border-radius: 24px; 
            border: 1px solid #dcdad4;
            width: 100%; 
            max-width: 420px; 
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        h2 { text-align: center; color: #6b6863; margin-bottom: 25px; font-size: 18px; font-weight: 600; letter-spacing: 1px; }
        input { 
            width: 100%; padding: 16px; margin-bottom: 16px; border: 1px solid #dcdad4; border-radius: 16px; 
            box-sizing: border-box; font-size: 16px; background-color: #ffffff; color: #4a4a4a; font-weight: 600; text-align: center;
            outline: none; transition: border 0.2s;
        }
        input:focus { border: 1px solid #a39e93; }
        button { 
            width: 100%; padding: 16px; background-color: #9e8e81; color: white; border: none; border-radius: 16px; 
            font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(158, 142, 129, 0.2);
        }
        button:hover { background-color: #8c7c70; }
        #result { margin-top: 25px; }
        
        /* 內卡：莫蘭迪霧面微透質感小卡 */
        .order-card { 
            background: rgba(255, 255, 255, 0.75); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 24px 20px; 
            border-radius: 24px; 
            margin-bottom: 20px; 
            color: #575451; 
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }
        
        /* 頂部標頭排列優化 */
        .card-header { 
            display: flex; 
            flex-direction: column; 
            align-items: flex-start; 
            gap: 12px; 
            margin-bottom: 20px; 
            border-bottom: 1px dashed #e4e2dd; 
            padding-bottom: 16px; 
        }
        
        /* 放大顯眼版代購品名標籤 */
        .tag-blue { 
            background: #7a6b5e; 
            color: white; 
            padding: 8px 16px; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 800; 
            letter-spacing: 0.5px;
            box-shadow: 0 2px 6px rgba(122, 107, 94, 0.15);
        }
        
        .user-hi { font-size: 15px; font-weight: 700; color: #6b6863; line-height: 1.4; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 14px; }
        .label { color: #8c8882; font-weight: 500; min-width: 80px; }
        .value { color: #575451; font-weight: 700; text-align: right; white-space: pre-wrap; word-break: break-all; }
        .price-text { font-size: 20px; font-weight: 800; color: #917b68; } 
        .block-row { display: flex; flex-direction: column; margin-bottom: 14px; }
        .block-value { color: #575451; font-weight: 600; text-align: left; white-space: pre-wrap; word-break: break-all; margin-top: 6px; line-height: 1.6; font-size: 14px; }
        
        /* 備註欄 */
        .memo-box { 
            background: rgba(238, 236, 231, 0.5); 
            border: 1px solid #e4e2dd; 
            padding: 12px; 
            border-radius: 12px; 
            font-size: 13px; 
            color: #736f6a; 
            margin-top: 6px; 
            white-space: pre-wrap; 
            line-height: 1.5; 
        }
        
        /* 狀態方塊 - 莫蘭迪霧調 */
        .status-container { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .status-box { border-radius: 14px; padding: 12px; text-align: center; display: flex; flex-direction: column; justify-content: center; gap: 4px; }
        .status-pay { background: #e3ebe4; border: 1px solid #cedbd0; color: #526657; } 
        .status-ship { background: #e6e3eb; border: 1px solid #d3cedb; color: #595266; } 
        .status-title { font-size: 12px; font-weight: 600; opacity: 0.8; }
        .status-val { font-size: 15px; font-weight: 700; }
        .text-center { text-align: center; color: #8c8882; font-size: 14px; }
    </style>
</head>
<body>
<div class="container">
    <h2>請輸入您填單時的手機號碼</h2>
    <input type="text" id="phoneInput" placeholder="請輸入手機號碼">
    <button onclick="checkOrder()">查詢訂單</button>
    <div id="result"></div>
</div>
<script>
    async function checkOrder() {
        const phone = document.getElementById('phoneInput').value.trim();
        const resultDiv = document.getElementById('result');
        if (!phone) { alert("請輸入手機號碼"); return; }
        resultDiv.innerHTML = "<p class='text-center'>正在連線查詢中...</p>";

        const apiUrl = "https://script.google.com/macros/s/AKfycbxR8H2kXLp91CLhkpsnvU0DvjnIHpNrsCW8cmyMOHhmBU7DPUuaahO1RCS-CJWRLULnoQ/exec"; 

        try {
            const response = await fetch(`${apiUrl}?id=${phone}`, { method: "GET", redirect: "follow" });
            const data = await response.json();
            
            if (data.status === "success" || (data.orders && data.orders.length > 0)) {
                resultDiv.innerHTML = ""; 
                
                const ordersList = data.orders ? data.orders : [];
                
                ordersList.forEach((order, index) => {
                    
                    let shippingStatus = "已包含";
                    let rawShipping = String(order.addShipping || "").toUpperCase().trim();
                    
                    if (rawShipping.includes("O") || rawShipping.includes("⭕") || rawShipping.includes("🔴")) {
                        shippingStatus = "未包含（需二補）";
                    } else if (rawShipping.includes("X") || rawShipping.includes("❌")) {
                        shippingStatus = "已包含";
                    } else if (order.addShipping) {
                        shippingStatus = order.addShipping;
                    }
                    
                    let finalMemo = order.memo ? order.memo : "商品抵達台灣後會依序安排寄出，謝謝您的配合！";
                    
                    resultDiv.innerHTML += `
                        <div class="order-card">
                            <div class="card-header">
                                <div class="tag-blue">${order.brand || "代購商品"}</div>
                                <div class="user-hi">HI！${order.name}，來確認專屬進度吧😉 </div>
                            </div>
                            <div class="info-row"><span class="label">出貨方式</span><span class="value">${order.shipMethod}</span></div>
                            <div class="info-row"><span class="label">國際運費</span><span class="value" style="color:#917b68;">${shippingStatus}</span></div>
                            <div class="block-row" style="margin-top: 15px;">
                                <span class="label">商品內容</span>
                                <div class="block-value">${order.items}</div>
                            </div>
                            <div class="info-row" style="align-items: flex-end; margin-top: 18px; border-top: 1px dashed #e4e2dd; padding-top: 12px;">
                                <span class="label">訂購金額</span>
                                <span class="value price-text">$ ${order.amount}</span>
                            </div>
                            <div class="block-row">
                                <span class="label">備註欄</span>
                                <div class="memo-box"><strong>賣家公告：</strong><br>${finalMemo}</div>
                            </div>
                            <div class="status-container">
                                <div class="status-box status-pay">
                                    <span class="status-title">對帳狀態</span>
                                    <span class="status-val">${order.payment}</span>
                                </div>
                                <div class="status-box status-ship">
                                    <span class="status-title">商品狀態</span>
                                    <span class="status-val">${order.itemStatus}</span>
                                </div>
                            </div>
                        </div>`;
                });
            } else { resultDiv.innerHTML = "<p class='text-center' style='color:#c25f5f;'>查無訂單，請確認號碼是否正確。</p>"; }
        } catch (error) { resultDiv.innerHTML = "<p class='text-center' style='color:#c25f5f;'>系統連線失敗，請稍後再試。</p>"; }
    }
</script>
</body>
</html>
